<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    padding: 10px;
}

.day {
    margin-bottom: 20px;
    background: #1c1c1c;
    padding: 12px;
    border-radius: 12px;
}

.slot {
    padding: 8px;
    margin: 6px 0;
    border-radius: 8px;
    background: #2a2a2a;
}

.booked {
    background: #00c853;
    color: black;
}

form {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
}

input, select {
    padding: 6px;
    border-radius: 6px;
    border: none;
}

button {
    padding: 6px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.delete {
    background: red;
    color: white;
}
</style>
</head>

<body>

<h2>📅 Admin Panel</h2>
<a href="/logout">Logout</a>

{% for day in days %}
<div class="day">

<h3>{{ day.date }}</h3>

{% if day.slots %}
    {% for s in day.slots %}

        <div class="slot">

        <strong>{{ s.time }}</strong>

        {% if s.booking %}

            <!-- EDIT -->
            <form method="POST" action="/admin/edit/{{ s.booking.index }}">

                <input type="hidden" name="date" value="{{ day.date }}">
                <input type="hidden" name="time" value="{{ s.time }}">

                <input name="name" value="{{ s.booking.name }}">
                <input name="phone" value="{{ s.booking.phone }}">

                <select name="service">
                    <option {% if s.booking.service=="Κούρεμα" %}selected{% endif %}>Κούρεμα</option>
                    <option {% if s.booking.service=="Μούσι" %}selected{% endif %}>Μούσι</option>
                    <option {% if s.booking.service=="Κούρεμα + Μούσι" %}selected{% endif %}>Κούρεμα + Μούσι</option>
                </select>

                <button type="submit">💾</button>
            </form>

            <!-- DELETE -->
            <a href="/admin/delete/{{ s.booking.index }}">
                <button class="delete">❌</button>
            </a>

        {% else %}

            <!-- ADD -->
            <form method="POST" action="/admin/add">

                <input type="hidden" name="date" value="{{ day.date }}">
                <input type="hidden" name="time" value="{{ s.time }}">

                <input name="name" placeholder="Όνομα">
                <input name="phone" placeholder="Τηλ">

                <select name="service">
                    <option>Κούρεμα</option>
                    <option>Μούσι</option>
                    <option>Κούρεμα + Μούσι</option>
                </select>

                <button>➕</button>
            </form>

        {% endif %}

        </div>

    {% endfor %}
{% else %}
    <p>❌ Κλειστά</p>
{% endif %}

</div>
{% endfor %}

</body>
</html>
