<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: Arial; background:#111; color:white; padding:10px; }

.day {
  background:#1c1c1c;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  cursor:pointer;
}

.box { display:none; margin-top:10px; }

.slot {
  padding:6px;
  margin:3px 0;
  border-radius:6px;
}

.free { background:#2e7d32; }
.booked { background:#c62828; }

.item {
  background:#333;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
}

button {
  padding:5px 8px;
  border:none;
  border-radius:6px;
}
</style>
</head>

<body>

<h2>📅 Admin Calendar (10 days)</h2>

{% for day in days %}

<div class="day" onclick="toggle({{ loop.index }})">
  📆 {{ day.date }}

  <div class="box" id="box{{ loop.index }}">

    <h4>🔥 Slots</h4>

    {% for s in day.free_slots %}
      <div class="slot free">
        🟢 {{ s.time }} (FREE)

        <!-- ADMIN CAN CREATE BOOKING -->
        <form method="POST" action="/admin/add">
      <input type="hidden" name="date" value="{{ day.date }}">
      <input type="hidden" name="time" value="{{ s.time }}">

      <input name="name" placeholder="Όνομα" required>
      <input name="phone" placeholder="Τηλ" required>

      <select name="service">
        <option>Κούρεμα</option>
        <option>Μούσι</option>
        <option>Κούρεμα + Μούσι</option>
      </select>

      <button type="submit">➕ Κράτηση</button>
  </form>
</div>
    {% endfor %}

    <h4>📌 Booked</h4>

    {% for b in day.bookings %}
      <div class="slot booked">

        🔴 {{ b.time }} - {{ b.name }}

        <br>

        <!-- EDIT -->
        <form method="POST" action="/admin/edit/{{ b.index }}">
          <input name="name" value="{{ b.name }}">
          <input name="phone" value="{{ b.phone }}">
          <input type="hidden" name="date" value="{{ b.time.split(' ')[0] }}">
          <input type="hidden" name="time" value="{{ b.time.split(' ')[1] }}">

          <button type="submit">💾 Edit</button>
        </form>

        <!-- DELETE -->
        <a href="/admin/delete/{{ b.index }}">
          <button style="background:red;color:white;">❌ Delete</button>
        </a>

      </div>
    {% endfor %}

  </div>
</div>

{% endfor %}

<script>
function toggle(id){
  let box = document.getElementById("box"+id);
  box.style.display = box.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
