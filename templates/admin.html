<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    padding: 10px;
}

h2 {
    text-align: center;
}

.day {
    background: #1c1c1c;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
}

.toggle-btn {
    background: #333;
    color: white;
    padding: 8px;
    border: none;
    border-radius: 6px;
    width: 100%;
    margin-bottom: 10px;
}

.box {
    display: none;
    margin-top: 10px;
}

.slot {
    padding: 8px;
    margin: 6px 0;
    border-radius: 6px;
}

.free {
    background: #2e7d32;
}

.booked {
    background: #c62828;
}

form {
    background: #222;
    padding: 10px;
    border-radius: 8px;
    margin-top: 5px;
}

input, select {
    width: 100%;
    padding: 6px;
    margin: 4px 0;
}

button {
    padding: 6px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>📅 Admin Panel</h2>

{% for day in days %}

<div class="day">

    <!-- ONLY BUTTON CONTROLS TOGGLE -->
    <button type="button" class="toggle-btn" onclick="toggle({{ loop.index }})">
        📆 {{ day.date }} (Άνοιγμα / Κλείσιμο)
    </button>

    <div class="box" id="box{{ loop.index }}">

        <h4>🟢 Free Slots</h4>

        {% for s in day.free_slots %}

        <div class="slot free">
            🟢 {{ s.time }}

            <!-- ADD BOOKING -->
            <form method="POST" action="/admin/add">
                <input type="hidden" name="date" value="{{ day.date }}">
                <input type="hidden" name="time" value="{{ s.time }}">

                <input name="name" placeholder="Όνομα" required>
                <input name="phone" placeholder="Τηλ" required>

                <select name="service">
                    <option>Κούρεμα</option>
                    <option>Μούσι</option>
                    <option>Κούρεμα + Μούσι</option>
                </select>

                <button type="submit">➕ Κράτηση</button>
            </form>
        </div>

        {% endfor %}

        <h4>🔴 Booked</h4>

        {% for b in day.bookings %}

        <div class="slot booked">
            🔴 {{ b.time }} - {{ b.name }}

            <!-- EDIT -->
            <form method="POST" action="/admin/edit/{{ b.index }}">
                <input name="name" value="{{ b.name }}">
                <input name="phone" value="{{ b.phone }}">

                <input type="hidden" name="date" value="{{ b.time.split(' ')[0] }}">
                <input type="hidden" name="time" value="{{ b.time.split(' ')[1] }}">

                <button type="submit">💾 Edit</button>
            </form>

            <!-- DELETE -->
            <a href="/admin/delete/{{ b.index }}">
                <button style="background:red;color:white;">❌ Delete</button>
            </a>

        </div>

        {% endfor %}

    </div>
</div>

{% endfor %}

<script>
function toggle(id){
    let box = document.getElementById("box"+id);

    if (box.style.display === "block") {
        box.style.display = "none";
    } else {
        box.style.display = "block";
    }
}
</script>

    
</body>
</html>
