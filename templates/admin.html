<h3>🕒 Διαθέσιμες Ώρες Σήμερα</h3>

<div style="display:flex;flex-wrap:wrap;gap:10px;">
{% for s in slots %}
    <div style="background:#333;padding:10px;border-radius:8px;">
        {{ s }}
    </div>
{% endfor %}
</div>

<hr>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    padding: 10px;
}

h2 {
    text-align: center;
}

.card {
    background: #222;
    padding: 15px;
    margin: 15px 0;
    border-radius: 12px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 5px 0;
    font-size: 16px;
    border-radius: 8px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #00c853;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 8px;
}

.delete {
    display: inline-block;
    margin-top: 10px;
    color: red;
    text-decoration: none;
    font-weight: bold;
}

.logout {
    text-align: center;
    margin-bottom: 10px;
}

.logout a {
    color: #ff5252;
}
</style>

</head>

<body>

<h2>💈 Admin Panel</h2>

<div class="logout">
    <a href="/logout">🚪 Logout</a>
</div>

{% for d in data %}

<div class="card">

<form method="POST" action="/admin/edit/{{ loop.index0 }}">

<label>Όνομα</label>
<input name="name" value="{{ d.name }}" required>

<label>Τηλέφωνο</label>
<input name="phone" value="{{ d.phone }}" required>

<label>Υπηρεσία</label>
<select name="service">
<option {% if d.service == "Κούρεμα" %}selected{% endif %}>Κούρεμα</option>
<option {% if d.service == "Μούσι" %}selected{% endif %}>Μούσι</option>
<option {% if d.service == "Κούρεμα + Μούσι" %}selected{% endif %}>Κούρεμα + Μούσι</option>
</select>

<label>Ημερομηνία</label>
<input type="date" name="date" required>

<label>Ώρα</label>
<input type="time" name="time" required>

<button type="submit">💾 Save αλλαγές</button>

</form>

<a class="delete" href="/cancel/{{ loop.index0 }}">🗑 Delete</a>

</div>

{% endfor %}

</body>
</html>
