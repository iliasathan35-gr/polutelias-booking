<h2>Admin Dashboard 💈</h2>

<a href="/logout">Logout</a>

<table border="1" cellpadding="8">
    <tr>
        <th>Όνομα</th>
        <th>Τηλέφωνο</th>
        <th>Υπηρεσία</th>
        <th>Ώρα</th>
        <th>Ενέργεια</th>
    </tr>

    {% for a in data %}
    <tr>
        <td>{{ a.name }}</td>
        <td>{{ a.phone }}</td>
        <td>{{ a.service }}</td>
        <td>{{ a.time }}</td>
        <td><a href="/cancel/{{ loop.index0 }}">❌ Delete</a></td>
    </tr>
    {% endfor %}
</table>
