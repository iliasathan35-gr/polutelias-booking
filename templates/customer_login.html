<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
    background:#0b0b0b;
    color:white;
    font-family:Poppins;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

.box{
    width:100%;
    max-width:400px;
    background:#171717;
    padding:30px;
    border-radius:30px;
}

h1{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:#222;
    color:white;
    margin-bottom:14px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:#00c853;
    color:white;
    font-size:16px;
    font-weight:700;
}

a{
    color:#00e676;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="box">

<h1>🔐 Login</h1>

<form method="POST">

<input
    name="phone"
    placeholder="Τηλέφωνο"
    required
>

<input
    type="password"
    name="password"
    placeholder="Password"
    required
>

<button type="submit">
    Σύνδεση
</button>

</form>

<br>

<a href="/customer/register">
    Δεν έχεις λογαριασμό;
</a>

</div>

</body>
</html>
