<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Admin Booking</title>

    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            padding: 20px;
        }

        input, select {
            display: block;
            margin-bottom: 10px;
            padding: 10px;
            width: 250px;
        }

        button {
            padding: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h2>➕ Νέο Ραντεβού (Admin)</h2>

<p>Ημερομηνία: {{ date }} {{ time }}</p>

<form method="POST">

    <input name="name" placeholder="Όνομα" required>
    <input name="phone" placeholder="Τηλέφωνο" required>

    <select name="service">
        <option>Κούρεμα</option>
        <option>Μούσι</option>
        <option>Κούρεμα + Μούσι</option>
    </select>

    <button type="submit">Αποθήκευση</button>

</form>

</body>
</html>
