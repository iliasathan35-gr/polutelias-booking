<!DOCTYPE html>
<html lang="el">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    padding:20px;
}

.back{
    display:inline-block;
    margin-bottom:20px;
    color:#00e676;
    text-decoration:none;
}

.card{
    background:#171717;
    border-radius:24px;
    padding:20px;
    margin-bottom:16px;
}

.title{
    font-size:28px;
    font-weight:bold;
    margin-bottom:8px;
}

.info{
    color:#aaa;
    margin-bottom:6px;
}

.note{
    background:#222;
    padding:14px;
    border-radius:16px;
    margin-top:10px;
}

.appointment{
    padding:14px;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

textarea{
    width:100%;
    background:#1e1e1e;
    border:none;
    color:white;
    padding:16px;
    border-radius:18px;
    margin-top:12px;
    outline:none;
    min-height:120px;
}

button{
    width:100%;
    margin-top:12px;
    background:#00c853;
    color:white;
    border:none;
    padding:16px;
    border-radius:18px;
    font-weight:bold;
    font-size:16px;
}

</style>
</head>
<body>

<a href="/admin/customers" class="back">
← Πελάτες
</a>

<div class="card">

<div class="title">
{{ customer_name }}
</div>

<div class="info">
📞 {{ phone }}
    <form method="POST"
      action="/admin/toggle-priority"
      style="margin-top:14px;">

<input type="hidden"
       name="phone"
       value="{{ phone }}">

<button type="submit">

⭐ Toggle Priority

</button>

</form>


<form method="POST"
      action="/admin/toggle-ban"
      style="margin-top:10px;">

<input type="hidden"
       name="phone"
       value="{{ phone }}">

<button
type="submit"
style="background:#c62828;">

🚫 Ban / Unban

</button>

</form>
    
</div>

<div class="info">
💈 Σύνολο επισκέψεων:
{{ appointments|length }}
</div>

</div>

<div class="card">

<h2>📅 Ιστορικό</h2>

{% for a in appointments %}

<div class="appointment">

<div>
✂ {{ a[0] }}
</div>

<div class="info">
{{ a[1] }}
</div>

</div>

{% endfor %}

</div>

<div class="card">

<h2>📝 Σημειώσεις</h2>

{% if notes %}

{% for n in notes %}

<div class="note">
{{ n }}
</div>

{% endfor %}

{% else %}

<div class="info">
Δεν υπάρχουν σημειώσεις
</div>

{% endif %}

<form method="POST" action="/admin/add-note">

<input type="hidden"
       name="phone"
       value="{{ phone }}">

<textarea
name="note"
placeholder="πχ low fade / όχι πολύ πάνω / θέλει texture">
</textarea>

<button type="submit">
💾 Αποθήκευση σημείωσης
</button>

</form>

</div>

</body>
</html>
