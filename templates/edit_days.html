<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    padding:20px;
}

.card{
    background:#171717;
    padding:18px;
    border-radius:18px;
    margin-bottom:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.btn{
    padding:10px 14px;
    border-radius:12px;
    border:none;
    cursor:pointer;
}

.block{
    background:#ff1744;
    color:white;
}

.unblock{
    background:#00e676;
    color:black;
}

a{
    color:#00e676;
    text-decoration:none;
}
</style>
</head>

<body>

<a href="/admin">← Admin</a>

<h2>📅 Edit 10 Days</h2>

{% for d in days %}

<div class="card">

    <div>
        {{ d.date }}
    </div>

    {% if d.blocked %}

    <a class="btn unblock"
       href="/admin/unblock-day/{{ d.date }}">
        Unblock
    </a>

    {% else %}

    <a class="btn block"
       href="/admin/block-day/{{ d.date }}">
        Block
    </a>

    {% endif %}

</div>

{% endfor %}

</body>
</html>
