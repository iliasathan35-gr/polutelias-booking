<!DOCTYPE html>
<html>
<head>
    <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>Polutelias 💈</title>
</head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    padding: 20px;
}

h2 {
    text-align: center;
}

form {
    background: #1c1c1c;
    padding: 15px;
    border-radius: 10px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #00c853;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}

.slots {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 10px;
}

.slot {
    background: #333;
    padding: 10px;
    text-align: center;
    border-radius: 6px;
    cursor: pointer;
}

.slot:hover {
    background: #555;
}

.selected {
    background: #00c853 !important;
}
</style>
</head>

<body>

<h2>💈 Κλείσε Ραντεβού</h2>

<form method="POST">

    <input name="name" placeholder="Όνομα" required>

    <input name="phone" placeholder="Τηλέφωνο" required>

    <select name="service" required>
        <option value="">Επίλεξε υπηρεσία</option>
<select name="service" required>

    <option value="">Επίλεξε υπηρεσία</option>

    {% for s in services %}
        <option value="{{ s }}">{{ s }}</option>
    {% endfor %}

</select>
    </select>

    <!-- DATE FIXED -->
    <label>📅 Ημερομηνία:</label>
    <input 
        type="date" 
        name="date" 
        value="{{ today }}"
        min="{{ today }}"
        max="{{ max_date }}"
        required
    >

    <!-- TIME SLOTS -->
    <label>⏰ Ώρα:</label>

    <div class="slots">
        {% for s in slots %}
        <div class="slot" onclick="selectTime('{{ s }}', this)">
            {{ s }}
        </div>
        {% endfor %}
    </div>

    <!-- hidden input για ώρα -->
    <input type="hidden" name="time" id="timeInput" required>

    <br>

    <button type="submit">Κλείσε Ραντεβού</button>

</form>

<script>
function selectTime(time, el){

    document.getElementById("timeInput").value = time;

    let slots = document.querySelectorAll(".slot");
    slots.forEach(s => s.classList.remove("selected"));

    el.classList.add("selected");
}
</script>

</body>
</html>
