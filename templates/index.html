<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Booking</title>

<style>
body { font-family: Arial; background:#111; color:white; padding:20px; }

.slot {
    display:inline-block;
    padding:10px;
    margin:5px;
    border-radius:8px;
}

.free { background:green; cursor:pointer; }
.booked { background:red; opacity:0.5; }
</style>
</head>

<body>

<h2>Κράτηση Ραντεβού</h2>

<form method="POST">

<input name="name" placeholder="Όνομα" required>
<input name="phone" placeholder="Τηλέφωνο" required>

<br><br>

<select name="service" required>
    <option value="">Υπηρεσία</option>
    {% for s in services %}
        <option value="{{ s }}">{{ s }}</option>
    {% endfor %}
</select>

<br><br>

<input type="date" name="date" value="{{ today }}" required>

<br><br>

<h3>Ώρες</h3>

{% for s in slots %}
    {% if s.status == "free" %}
        <label class="slot free">
            <input type="radio" name="time" value="{{ s.time }}" required>
            🟢 {{ s.time }}
        </label>
    {% else %}
        <div class="slot booked">🔴 {{ s.time }}</div>
    {% endif %}
{% endfor %}

<br><br>

<button type="submit">Κράτηση</button>

</form>

</body>
</html>
