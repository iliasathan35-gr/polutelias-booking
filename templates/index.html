<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Polutelias 💈</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#00c853">
    
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

body{
    font-family:'Poppins',sans-serif;
    background:#0b0b0b;
    color:white;
    min-height:100vh;
    overflow-x:hidden;
}

.app{
    max-width:520px;
    margin:auto;
    padding:20px 18px 120px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.brand{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo{
    width:54px;
    height:54px;
    border-radius:18px;
    background:linear-gradient(135deg,#00c853,#00e676);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    box-shadow:0 10px 25px rgba(0,200,83,0.35);
}

.brand h1{
    font-size:24px;
    font-weight:700;
}

.brand p{
    color:#8f8f8f;
    font-size:13px;
}

.hero{
    background:linear-gradient(145deg,#171717,#111);
    border-radius:32px;
    padding:24px;
    margin-bottom:20px;
    position:relative;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.04);
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

.hero::before{
    content:'';
    position:absolute;
    width:180px;
    height:180px;
    border-radius:50%;
    background:rgba(0,200,83,0.08);
    top:-60px;
    right:-60px;
}

.hero h2{
    font-size:28px;
    margin-bottom:10px;
    position:relative;
    z-index:2;
}

.hero p{
    color:#aaa;
    line-height:1.5;
    position:relative;
    z-index:2;
}

.glass{
    backdrop-filter:blur(20px);
    background:rgba(25,25,25,0.9);
    border:1px solid rgba(255,255,255,0.04);
    border-radius:30px;
    padding:22px;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

.section{
    margin-bottom:22px;
}

.section-title{
    margin-bottom:12px;
    font-size:15px;
    font-weight:600;
    color:#bbb;
}

input,
select{
    width:100%;
    background:#1d1d1d;
    border:none;
    color:white;
    padding:18px;
    border-radius:18px;
    font-size:15px;
    outline:none;
    transition:0.2s;
}

input:focus,
select:focus{
    transform:scale(1.01);
    border:1px solid #00c853;
}

.slots-wrapper{
    overflow-x:auto;
    padding-bottom:6px;
}

.slots{
    display:flex;
    gap:12px;
    min-width:max-content;
}

.slot{
    min-width:90px;
    padding:16px 10px;
    background:#202020;
    border-radius:22px;
    text-align:center;
    cursor:pointer;
    transition:0.22s;
    font-weight:600;
    border:1px solid transparent;
    user-select:none;
}

.slot:hover{
    transform:translateY(-2px);
}

.selected{
    background:linear-gradient(135deg,#00c853,#00e676);
    color:white;
    border:1px solid #00ff80;
    box-shadow:0 10px 25px rgba(0,200,83,0.35);
}

.book-btn{
    width:100%;
    border:none;
    padding:20px;
    border-radius:24px;
    background:linear-gradient(135deg,#00c853,#00e676);
    color:white;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    transition:0.25s;
    box-shadow:0 12px 25px rgba(0,200,83,0.3);
}

.book-btn:hover{
    transform:translateY(-2px);
}

.stats{
    display:flex;
    gap:12px;
    overflow-x:auto;
    margin-top:22px;
}

.stat-card{
    min-width:120px;
    background:#181818;
    border-radius:24px;
    padding:18px;
    border:1px solid rgba(255,255,255,0.04);
}

.stat-card h3{
    font-size:13px;
    color:#aaa;
    margin-bottom:8px;
}

.stat-card p{
    font-size:18px;
    font-weight:700;
}

.bottom-nav{
    position:fixed;
    left:50%;
    transform:translateX(-50%);
    bottom:18px;
    width:calc(100% - 32px);
    max-width:500px;
    background:rgba(20,20,20,0.95);
    border:1px solid rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    border-radius:28px;
    display:flex;
    justify-content:space-around;
    padding:16px;
    box-shadow:0 15px 40px rgba(0,0,0,0.45);
}

.nav-item{
    text-align:center;
    color:#bbb;
    font-size:13px;
}

.nav-item.active{
    color:#00e676;
}

.no-slots{
    width:100%;
    background:#1e1e1e;
    border-radius:22px;
    padding:18px;
    text-align:center;
    color:#999;
}

.fade-in{
    animation:fade 0.35s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(8px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="app">

    <div class="topbar">

        <div class="brand">
            <div class="logo">💈</div>

            <div>
                <h1>Polutelias</h1>
                <p>Premium Barber Experience</p>
            </div>
        </div>

    </div>

    <div class="hero fade-in">
        <h2>Κλείσε το επόμενο σου ραντεβού</h2>
        <p>
            Επίλεξε υπηρεσία, ημέρα και ώρα εύκολα μέσα από το mobile booking app.
        </p>
    </div>

    <div class="glass fade-in">

        <form method="POST">

            <div class="section">
                <div class="section-title">👤 Στοιχεία</div>

                <input name="name" placeholder="Όνομα" required>
            </div>

            <div class="section">
                <input name="phone" placeholder="Τηλέφωνο" required>
            </div>

            <div class="section">
                <div class="section-title">✂ Υπηρεσία</div>

                <select name="service" required>
                    <option value="">Επίλεξε υπηρεσία</option>

                    {% for s in services %}
                        <option>{{ s }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="section">
                <div class="section-title">📅 Ημερομηνία</div>

                <input
                    type="date"
                    id="date"
                    name="date"
                    value="{{ today }}"
                    min="{{ today }}"
                    max="{{ max_date }}"
                    required
                >
            </div>

            <div class="section">
                <div class="section-title">⏰ Διαθέσιμες ώρες</div>

                <div class="slots-wrapper">
                    <div class="slots" id="slots"></div>
                </div>
            </div>

            <input type="hidden" name="time" id="timeInput" required>

            <button type="submit" class="book-btn">
                Κλείσε Ραντεβού
            </button>

        </form>

        <div class="stats">

            <div class="stat-card">
                <h3>⭐ Rating</h3>
                <p>5.0</p>
            </div>

            <div class="stat-card">
                <h3>📍 Location</h3>
                <p>Larisa-stomio</p>
            </div>

            <div class="stat-card">
                <h3>⏱ Duration</h3>
                <p>30-45 min</p>
            </div>

        </div>

    </div>

</div>

<div class="bottom-nav">
    <div class="nav-item active">
        🏠<br>Home
    </div>

    <div class="nav-item">
        📅<br>Bookings
    </div>

    <div class="nav-item">
        👤<br>Profile
    </div>
</div>

<script>

function selectTime(time, el){

    document.getElementById("timeInput").value = time;

    let slots = document.querySelectorAll(".slot");

    slots.forEach(s => s.classList.remove("selected"));

    el.classList.add("selected");
}


function loadSlots(date){

    fetch("/slots?date=" + date)

    .then(res => res.json())

    .then(data => {

        let container = document.getElementById("slots");

        let selectedTime = document.getElementById("timeInput").value;

        container.innerHTML = "";

        if(data.length === 0){

            container.innerHTML =
            '<div class="no-slots">❌ Δεν υπάρχουν διαθέσιμες ώρες</div>';

            return;
        }

        data.forEach(time => {

            let div = document.createElement("div");

            div.className = "slot fade-in";

            div.innerText = time;

            if(time === selectedTime){
                div.classList.add("selected");
            }

            div.onclick = function(){
                selectTime(time, div);
            };

            container.appendChild(div);

        });

    });
}


document.getElementById("date").addEventListener("input", function () {

    let selected = new Date(this.value);

    if (selected.getDay() === 0) {

        alert("❌ Τις Κυριακές είμαστε κλειστά");

        this.value = "";

        document.getElementById("slots").innerHTML = "";

        return;
    }

    loadSlots(this.value);

});


window.onload = function(){

    let date = document.getElementById("date").value;

    if(date){
        loadSlots(date);
    }
}


// LIVE UPDATES
setInterval(function(){

    let date = document.getElementById("date").value;

    if(date){
        loadSlots(date);
    }

},5000);

</script>

</body>
</html>
