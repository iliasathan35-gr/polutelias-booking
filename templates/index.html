<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    padding: 10px;
}

.card {
    max-width: 420px;
    margin: auto;
    background: #1c1c1c;
    padding: 20px;
    border-radius: 16px;
}

input, select {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
    background: #2a2a2a;
    color: white;
}

button.submit {
    width: 100%;
    padding: 14px;
    background: #00c853;
    border: none;
    color: white;
    border-radius: 12px;
}

.slots {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.slot-btn {
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #444;
    background: transparent;
    color: white;
}

.slot-btn.selected {
    background: #00c853;
}
</style>
</head>

<body>

<div class="card">

<h2>💈 Κλείσε Ραντεβού</h2>

<form method="POST">

<input name="name" placeholder="Όνομα" required>
<input name="phone" placeholder="Τηλέφωνο" required>

<select name="service" required>
<option value="">Υπηρεσία</option>
{% for s in services %}
<option>{{ s }}</option>
{% endfor %}
</select>

<input type="date" name="date" id="dateInput" required>

<div class="slots" id="slotsContainer">
{% for s in slots %}
<button type="button" class="slot-btn" onclick="selectTime('{{ s }}', this)">
{{ s }}
</button>
{% endfor %}
</div>

<input type="hidden" name="time" id="timeInput">

<button type="submit" class="submit">Κλείσε</button>

</form>

</div>

<script>
function selectTime(time, el){
    document.getElementById("timeInput").value = time;
    document.querySelectorAll(".slot-btn").forEach(b => b.classList.remove("selected"));
    el.classList.add("selected");
}

// 🔥 dynamic slots ανά ημερομηνία
document.getElementById("dateInput").addEventListener("change", function(){
    let date = this.value;

    fetch("/slots?date=" + date)
    .then(res => res.json())
    .then(data => {
        let container = document.getElementById("slotsContainer");
        container.innerHTML = "";

        data.forEach(s => {
            let btn = document.createElement("button");
            btn.type = "button";
            btn.className = "slot-btn";
            btn.innerText = s;

            btn.onclick = function(){
                selectTime(s, btn);
            };

            container.appendChild(btn);
        });
    });
});
</script>

</body>
</html>
