<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Polutelias 💈</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#0f0f0f;
    color:white;
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
}

.hero{
    background:linear-gradient(145deg,#1a1a1a,#111);
    border-radius:24px;
    padding:30px 20px;
    margin-bottom:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    border:1px solid rgba(255,255,255,0.05);
}

.logo{
    font-size:34px;
    margin-bottom:10px;
}

.hero h1{
    font-size:30px;
    margin-bottom:8px;
}

.hero p{
    color:#aaa;
    font-size:14px;
}

.card{
    background:#171717;
    border-radius:24px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
    border:1px solid rgba(255,255,255,0.05);
}

.section-title{
    font-size:15px;
    margin-bottom:10px;
    color:#bbb;
    font-weight:600;
}

input,
select{
    width:100%;
    background:#222;
    color:white;
    border:none;
    border-radius:16px;
    padding:16px;
    margin-bottom:14px;
    font-size:15px;
    outline:none;
}

input:focus,
select:focus{
    border:1px solid #00c853;
}

.slots{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:10px;
}

.slot{
    background:#262626;
    border-radius:16px;
    padding:14px 10px;
    text-align:center;
    cursor:pointer;
    transition:0.2s;
    font-weight:600;
    border:1px solid transparent;
}

.slot:hover{
    transform:scale(1.03);
    background:#333;
}

.selected{
    background:#00c853 !important;
    color:white;
    border:1px solid #00ff80;
    box-shadow:0 0 12px rgba(0,200,83,0.5);
}

.book-btn{
    width:100%;
    margin-top:18px;
    border:none;
    background:linear-gradient(135deg,#00c853,#00e676);
    color:white;
    padding:18px;
    border-radius:18px;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    transition:0.2s;
}

.book-btn:hover{
    transform:translateY(-2px);
}

.info{
    margin-top:18px;
    display:flex;
    gap:10px;
    overflow-x:auto;
}

.info-box{
    min-width:120px;
    background:#1f1f1f;
    border-radius:18px;
    padding:14px;
    text-align:center;
    border:1px solid rgba(255,255,255,0.05);
}

.info-box h3{
    font-size:14px;
    margin-bottom:4px;
}

.info-box p{
    color:#aaa;
    font-size:12px;
}

.no-slots{
    background:#222;
    border-radius:16px;
    padding:16px;
    text-align:center;
    color:#aaa;
}

@media(max-width:500px){
    .slots{
        grid-template-columns:repeat(2,1fr);
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="hero">
        <div class="logo">💈</div>
        <h1>Polutelias</h1>
        <p>Premium Barber Booking Experience</p>
    </div>

    <div class="card">

        <form method="POST">

            <div class="section-title">👤 Τα στοιχεία σου</div>

            <input name="name" placeholder="Όνομα" required>

            <input name="phone" placeholder="Τηλέφωνο" required>

            <div class="section-title">✂ Υπηρεσία</div>

            <select name="service" required>
                <option value="">Επίλεξε υπηρεσία</option>

                {% for s in services %}
                    <option>{{ s }}</option>
                {% endfor %}
            </select>

            <div class="section-title">📅 Ημερομηνία</div>

            <input
                type="date"
                id="date"
                name="date"
                value="{{ today }}"
                min="{{ today }}"
                max="{{ max_date }}"
                required
            >

            <div class="section-title">⏰ Διάλεξε ώρα</div>

            <div class="slots" id="slots"></div>

            <input type="hidden" name="time" id="timeInput" required>

            <button type="submit" class="book-btn">
                Κλείσε Ραντεβού
            </button>

        </form>

        <div class="info">
            <div class="info-box">
                <h3>📍 Location</h3>
                <p>Larisa</p>
            </div>

            <div class="info-box">
                <h3>⭐ Rating</h3>
                <p>5.0</p>
            </div>

            <div class="info-box">
                <h3>⏱ Duration</h3>
                <p>45 λεπτά</p>
            </div>
        </div>

    </div>

</div>

<script>

function selectTime(time, el){

    document.getElementById("timeInput").value = time;

    let slots = document.querySelectorAll(".slot");

    slots.forEach(s => s.classList.remove("selected"));

    el.classList.add("selected");
}


function loadSlots(date){

    fetch("/slots?date=" + date)

    .then(res => res.json())

    .then(data => {

        let container = document.getElementById("slots");

        let selectedTime = document.getElementById("timeInput").value;

        container.innerHTML = "";

        if(data.length === 0){

            container.innerHTML =
            '<div class="no-slots">❌ Δεν υπάρχουν διαθέσιμες ώρες</div>';

            return;
        }

        data.forEach(time => {

            let div = document.createElement("div");

            div.className = "slot";

            div.innerText = time;

            if(time === selectedTime){
                div.classList.add("selected");
            }

            div.onclick = function(){
                selectTime(time, div);
            };

            container.appendChild(div);

        });

    });
}


// DATE CHANGE

document.getElementById("date").addEventListener("input", function () {

    let selected = new Date(this.value);

    // Κυριακή
    if (selected.getDay() === 0) {

        alert("❌ Τις Κυριακές είμαστε κλειστά");

        this.value = "";

        document.getElementById("slots").innerHTML = "";

        return;
    }

    loadSlots(this.value);

});


// INITIAL LOAD
window.onload = function(){

    let date = document.getElementById("date").value;

    if(date){
        loadSlots(date);
    }
}


// LIVE UPDATES
setInterval(function(){

    let date = document.getElementById("date").value;

    if(date){
        loadSlots(date);
    }

},5000);

</script>

</body>
</html>
```
