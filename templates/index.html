<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Polutelias 💈</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    padding: 20px;
}

h2 {
    text-align: center;
}

form {
    background: #1c1c1c;
    padding: 15px;
    border-radius: 10px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: none;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 12px;
    background: #00c853;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

.slots {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 10px;
}

.slot {
    background: #333;
    padding: 10px;
    text-align: center;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
}

.slot:hover {
    background: #555;
}

.selected {
    background: #00c853 !important;
}
</style>
</head>

<body>

<h2>💈 Κλείσε Ραντεβού</h2>

<form method="POST">

    <input name="name" placeholder="Όνομα" required>

    <input name="phone" placeholder="Τηλέφωνο" required>

    <select name="service" required>
        <option value="">Επίλεξε υπηρεσία</option>

        {% for s in services %}
            <option>{{ s }}</option>
        {% endfor %}
    </select>

    <!-- DATE -->
    <label>📅 Ημερομηνία:</label>

    <input 
        type="date"
        id="date"
        name="date"
        value="{{ today }}"
        min="{{ today }}"
        max="{{ max_date }}"
        required
    >

    <!-- TIME -->
    <label>⏰ Ώρα:</label>

    <div class="slots" id="slots"></div>

    <!-- hidden time input -->
    <input type="hidden" name="time" id="timeInput" required>

    <br>

    <button type="submit">Κλείσε Ραντεβού</button>

</form>

<script>

function selectTime(time, el){

    document.getElementById("timeInput").value = time;

    let slots = document.querySelectorAll(".slot");

    slots.forEach(s => s.classList.remove("selected"));

    el.classList.add("selected");
}


// LOAD SLOTS
function loadSlots(date){

    fetch("/slots?date=" + date)

    .then(res => res.json())

    .then(data => {

        let container = document.getElementById("slots");

        container.innerHTML = "";

        // ❌ no slots
        if(data.length === 0){

            container.innerHTML =
            "<p>❌ Δεν υπάρχουν διαθέσιμες ώρες</p>";

            return;
        }

        // create buttons
        data.forEach(time => {

            let div = document.createElement("div");

            div.className = "slot";

            div.innerText = time;

            div.onclick = function(){
                selectTime(time, div);
            };

            container.appendChild(div);

        });

    });
}


// DATE CHANGE
document.getElementById("date").addEventListener("input", function () {

    let selected = new Date(this.value);

    // ❌ Κυριακή
    if (selected.getDay() === 0) {

        alert("❌ Τις Κυριακές είμαστε κλειστά");

        this.value = "";

        document.getElementById("slots").innerHTML = "";

        return;
    }

    loadSlots(this.value);

});


// INITIAL LOAD
window.onload = function(){

    let date = document.getElementById("date").value;

    if(date){
        loadSlots(date);
    }
}

</script>

<script>

// LIVE UPDATES (κάθε 5 sec)
setInterval(function(){

    let date = document.getElementById("date").value;

    if(date){

        fetch("/slots?date=" + date)
        .then(res => res.json())
        .then(data => {

            let container = document.getElementById("slots");

            // κρατάμε το selected time
            let selectedTime = document.getElementById("timeInput").value;

            container.innerHTML = "";

            if(data.length === 0){
                container.innerHTML = "<p>❌ Δεν υπάρχουν διαθέσιμες ώρες</p>";
                return;
            }

            data.forEach(time => {

                let div = document.createElement("div");

                div.className = "slot";

                div.innerText = time;

                // αν είναι ήδη selected → κράτα το highlight
                if(time === selectedTime){
                    div.classList.add("selected");
                }

                div.onclick = function(){
                    selectTime(time, div);
                };

                container.appendChild(div);
            });

        });

    }

}, 5000);

</script>
    
</body>
</html>
